name = "bulk-activator"
main = "index.js"
compatibility_date = "2024-01-01"
account_id = "5313f8b98e20a8915418b2683ad7278c"
workers_dev = true

[observability.logs]
enabled = true
invocation_logs = true

# Queue: one SIM at a time, max 5 per batch, retry up to 2x on crash
[[queues.producers]]
queue = "sim-activation-queue"
binding = "ACTIVATION_QUEUE"

[[queues.consumers]]
queue = "sim-activation-queue"
max_batch_size = 5
max_retries = 2
max_concurrency = 1

# ============ TEST ENVIRONMENT ============
[env.test]
name = "bulk-activator-test"

[env.test.observability.logs]
enabled = true
invocation_logs = true

[[env.test.queues.producers]]
queue = "sim-activation-queue-test"
binding = "ACTIVATION_QUEUE"

[[env.test.queues.consumers]]
queue = "sim-activation-queue-test"
max_batch_size = 5
max_retries = 2
max_concurrency = 1
