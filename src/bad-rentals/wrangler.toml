name = "bad-rentals"
main = "index.js"
compatibility_date = "2024-01-01"
account_id = "5313f8b98e20a8915418b2683ad7278c"
workers_dev = true

# INC-3 follow-up: dedicated subdomain for the Bad Rental product surface.
# Auto-provisions DNS + TLS via Cloudflare (same pattern as portal.incoming-sms.com).
routes = [
  { pattern = "bad-rentals.incoming-sms.com", custom_domain = true }
]

[observability.logs]
enabled = true
invocation_logs = true

# ============ TEST ENVIRONMENT ============
# Override (do NOT inherit) the top-level production custom domain — without
# this `wrangler deploy --env test` would re-point bad-rentals.incoming-sms.com
# at the test worker (cf memory: wrangler-test-env-inherits-custom-domain.md).
[env.test]
name = "bad-rentals-test"
routes = []
workers_dev = true

[env.test.observability.logs]
enabled = true
invocation_logs = true
