name = "mdn-rotator"
main = "index.js"
compatibility_date = "2024-01-01"
account_id = "5313f8b98e20a8915418b2683ad7278c"
workers_dev = true

[triggers]
# Rotation: every 20 min 12am-12pm EST (5am-5pm UTC)
# "0,20,40 5-16" covers 12:00am-11:40am EST; "0 17" covers 12:00pm EST exactly
crons = ["0,20,40 5-16 * * *", "0 17 * * *"]

# KV namespace for token caching
[[kv_namespaces]]
binding = "TOKEN_CACHE"
id = "edaf2c8828b14badb3037600635f8a7f"

# Queue for processing SIMs in batches
[[queues.producers]]
queue = "mdn-rotation-queue"
binding = "MDN_QUEUE"

[[queues.consumers]]
queue = "mdn-rotation-queue"
max_batch_size = 10
max_retries = 2
max_concurrency = 1

# Queue for fix-sim jobs (runs outside 30s service-binding limit)
[[queues.producers]]
queue = "fix-sim-queue"
binding = "FIX_SIM_QUEUE"

[[queues.consumers]]
queue = "fix-sim-queue"
max_batch_size = 1
max_retries = 2
max_concurrency = 1

# Service binding for skyline-gateway worker
[[services]]
binding = "SKYLINE_GATEWAY"
service = "skyline-gateway"

[observability.logs]
enabled = true
invocation_logs = true

# ============ TEST ENVIRONMENT ============
[env.test]
name = "mdn-rotator-test"
main = "index.ts"

[env.test.triggers]
# No crons in test - trigger manually via dashboard
crons = []

# KV namespace for token caching (TEST)
[[env.test.kv_namespaces]]
binding = "TOKEN_CACHE"
id = "689e9a6ec8c849cfb32bc5154cf8d680"

# Queue for processing SIMs in batches (TEST)
[[env.test.queues.producers]]
queue = "mdn-rotation-queue-test"
binding = "MDN_QUEUE"

[[env.test.queues.consumers]]
queue = "mdn-rotation-queue-test"
max_batch_size = 10
max_retries = 3
max_concurrency = 1

# Service binding for skyline-gateway worker (TEST)
[[env.test.services]]
binding = "SKYLINE_GATEWAY"
service = "skyline-gateway-test"

[env.test.observability.logs]
enabled = true
invocation_logs = true
