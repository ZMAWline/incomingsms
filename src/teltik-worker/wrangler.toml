name = "teltik-worker"
main = "index.js"
compatibility_date = "2024-01-01"
account_id = "5313f8b98e20a8915418b2683ad7278c"
workers_dev = true

[vars]
# Rotation concurrency: 8 lanes (ramped from 4 after the clean first night
# 2026-06-16) so the nightly cohort clears early in the window.
TELTIK_ROTATE_CONCURRENCY = "8"
# Night-migration: defer morning-anchored lines to midnight, 100/day. Set to
# "off" (or remove) once migration is complete (~14 days). Operator-approved.
TELTIK_NIGHT_MIGRATION = "on"
TELTIK_MIGRATION_BATCH = "100"
# INC-2 rental capture: mint a rental (+ record the reseller's rentalId from the
# number.online 200 response) on every inline Teltik rotation. reseller-sync and
# details-finalizer already do this on their paths; the inline rotate path here
# (used by the night-migration) did not — causing uncaptured rentals from 06-16.
RENTAL_CAPTURE_ENABLED = "true"

[triggers]
# 10,40 4-14 UTC — rotation ticks; isInsideRotationWindowNY() narrows to NY 0-8.
# 0 2 * * * UTC (NY 22:00, before the window) — daily night-migration batch.
crons = ["10,40 4-14 * * *", "0 2 * * *"]

[observability.logs]
enabled = true
invocation_logs = true

[env.test]
name = "teltik-worker-test"
[env.test.triggers]
crons = []
[env.test.observability.logs]
enabled = true
invocation_logs = true
