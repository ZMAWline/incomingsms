name = "teltik-worker"
main = "index.js"
compatibility_date = "2024-01-01"
account_id = "5313f8b98e20a8915418b2683ad7278c"
workers_dev = true

[triggers]
# Rotation window: 12:00 AM – 9:00 AM America/New_York (DST-aware).
# UTC 4-14 covers both DST states; isInsideRotationWindowNY() gate narrows to NY 0-8.
crons = ["10,40 4-14 * * *"]

[observability.logs]
enabled = true
invocation_logs = true

