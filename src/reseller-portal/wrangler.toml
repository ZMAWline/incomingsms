name = "reseller-portal"
main = "index.js"
compatibility_date = "2024-01-01"
account_id = "5313f8b98e20a8915418b2683ad7278c"
workers_dev = true

# Custom domain — auto-provisions DNS + TLS via Cloudflare.
# The legacy reseller-portal.zalmen-531.workers.dev URL stays active alongside.
routes = [
  { pattern = "portal.incoming-sms.com", custom_domain = true }
]

[observability.logs]
enabled = true
invocation_logs = true

# Service binding so portal can call reseller-sync without going over public HTTP.
[[services]]
binding = "RESELLER_SYNC"
service = "reseller-sync"

# ============ TEST ENVIRONMENT ============
[env.test]
name = "reseller-portal-test"
# Override (do NOT inherit) the top-level production custom domain. Without this,
# `wrangler deploy --env test` re-points portal.incoming-sms.com at the test worker.
# Test stays on its *.workers.dev URL only.
routes = []
workers_dev = true

[env.test.observability.logs]
enabled = true
invocation_logs = true

[[env.test.services]]
binding = "RESELLER_SYNC"
service = "reseller-sync-test"
