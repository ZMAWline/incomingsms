name = "details-finalizer"
main = "index.js"
compatibility_date = "2024-01-01"
account_id = "5313f8b98e20a8915418b2683ad7278c"
workers_dev = true

[triggers]
# */5 * * * * — regular finalizer (Helix/Wing/Teltik/ATOMIC) every 5 min.
# 30 10 * * * — daily reconciliation at UTC 10:30 (NY 6:30 EDT / 5:30 EST), 30
# min after rotation window closes. Gated on RECONCILIATION_ENABLED secret.
# 0 */6 * * * — address-pool refill every 6h: replace quarantined PPU addresses
# with fresh OSM-sourced civic-building addresses in the same zip.
# 45 */2 * * * — catch-up sweep: safe playbook auto-fixes + missed-due retries
# (outside the rotation window) + delivery reconciliation, every 2h at :45 to
# stay clear of mdn-rotator (:00/:20/:40) and teltik-worker (:10/:40) ticks.
# Operator-approved 2026-06-12.
# scheduled() branches on event.cron so the paths never run together.
crons = ["*/5 * * * *", "30 10 * * *", "0 */6 * * *", "45 */2 * * *"]

[observability.logs]
enabled = true
invocation_logs = true

# Service binding for Skyline gateway
[[services]]
binding = "SKYLINE_GATEWAY"
service = "skyline-gateway"

# mdn-rotator holds ATOMIC credentials; details-finalizer reaches it via this binding
# for subsriberInquiry reconciliation of ATOMIC SIMs stuck in provisioning.
[[services]]
binding = "MDN_ROTATOR"
service = "mdn-rotator"

# teltik-worker holds Teltik API key; rotation-review calls /rotate-sim via this
# binding instead of the public URL (CF blocks worker→public-workers.dev fetches).
[[services]]
binding = "TELTIK_WORKER"
service = "teltik-worker"

# ============ TEST ENVIRONMENT ============
[env.test]
name = "details-finalizer-test"

[env.test.triggers]
# No crons in test - trigger manually via dashboard
crons = []

[[env.test.services]]
binding = "SKYLINE_GATEWAY"
service = "skyline-gateway-test"

[[env.test.services]]
binding = "MDN_ROTATOR"
service = "mdn-rotator-test"

[[env.test.services]]
binding = "TELTIK_WORKER"
service = "teltik-worker-test"

[env.test.observability.logs]
enabled = true
invocation_logs = true
