<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Numbox</title>
<meta name="description" content="Rent a private US number, watch your live SMS inbox, and manage your balance.">
<meta name="theme-color" content="#FFFFFF">
<meta property="og:type" content="website">
<meta property="og:title" content="Numbox — your numbers and inbox">
<meta property="og:description" content="Rent a private US number, watch your live SMS inbox, and manage your balance.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230B1220'/%3E%3Cpath d='M22 46V18l20 28V18' stroke='%23ffffff' stroke-width='6' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0B1220;
  --muted: #5B6472;
  --bg: #F7F8FA;
  --panel: #ffffff;
  --line: #E5E7EB;
  --accent: #2563EB;
  --accent-down: #1D4FD7;
  --ok: #16803C;
  --bad: #B42318;
  --radius: 12px;
  --shadow-sm: 0 1px 2px rgb(16 24 40 / 6%);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  font-size: 16px;
  background: var(--bg); color: var(--ink); line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.wrap {
  max-width: 1080px; margin: 0 auto;
  padding-left: max(16px, env(safe-area-inset-left));
  padding-right: max(16px, env(safe-area-inset-right));
  padding-bottom: calc(64px + env(safe-area-inset-bottom));
}
a { color: var(--accent); text-decoration: none; }
.hidden { display: none !important; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

/* header */
header {
  background: var(--panel); border-bottom: 1px solid var(--line); margin-bottom: 20px;
  position: sticky; top: 0; z-index: 30;
  padding-top: env(safe-area-inset-top);
}
.head-inner {
  max-width: 1080px; margin: 0 auto;
  padding-left: max(16px, env(safe-area-inset-left));
  padding-right: max(16px, env(safe-area-inset-right));
  min-height: 60px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.wordmark {
  display: inline-flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: 17px; letter-spacing: -0.02em; color: var(--ink);
}
.wordmark svg { flex: none; }
.head-right { display: flex; align-items: center; gap: 8px; font-size: 14px; min-width: 0; }
.head-right .muted { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
.balance {
  font-weight: 600; font-variant-numeric: tabular-nums;
  background: var(--bg); border: 1px solid var(--line); border-radius: 99px;
  padding: 6px 12px; line-height: 1.2; white-space: nowrap;
}

/* buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  min-height: 44px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
  font: 600 16px/1.2 'Inter', system-ui, sans-serif; padding: 0 18px; cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: background-color 0.15s ease;
}
.btn:hover { background: var(--accent-down); }
.btn:disabled { opacity: 0.55; cursor: default; }
.btn-ghost { background: var(--panel); color: var(--ink); border: 1px solid var(--line); box-shadow: none; }
.btn-ghost:hover { background: var(--bg); }
.btn-sm { min-height: 40px; font-size: 14px; padding: 0 14px; border-radius: 10px; }
@media (pointer: coarse) { .btn-sm { min-height: 44px; } }
.btn-block { width: 100%; }
.btn-icon { padding: 0; width: 44px; }
.btn.copied { background: var(--panel); color: var(--ok); border: 1px solid var(--line); box-shadow: none; }

.panel {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm);
}
h2 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 14px; }
.section { margin-bottom: 24px; }
.muted { color: var(--muted); }
.small { font-size: 13.5px; }

/* auth */
.auth-card { max-width: 400px; margin: 40px auto; padding: 26px 22px; }
.auth-brand { text-align: center; margin-bottom: 20px; }
.auth-brand .wordmark { font-size: 20px; justify-content: center; }
.auth-tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 18px; }
.auth-tabs button {
  flex: 1; min-height: 40px; border: none; background: transparent; border-radius: 8px;
  font: 600 14px 'Inter', system-ui, sans-serif; cursor: pointer; color: var(--muted);
}
.auth-tabs button.on { background: var(--panel); color: var(--ink); box-shadow: var(--shadow-sm); }
label { display: block; font-size: 14px; font-weight: 500; margin: 14px 0 6px; }
input[type=email], input[type=password], input[type=number] {
  width: 100%; min-height: 46px; padding: 10px 14px; border: 1px solid var(--line); border-radius: 10px;
  font: 400 16px 'Inter', system-ui, sans-serif; color: var(--ink); background: var(--panel);
}
input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
.auth-card .btn { width: 100%; margin-top: 20px; }
.form-err { color: var(--bad); font-size: 13.5px; margin-top: 12px; min-height: 18px; }

/* stock grid */
.grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
@media (min-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 1080px) { .grid { grid-template-columns: repeat(4, 1fr); } }
.stock-card {
  border: 1px solid var(--line); border-radius: var(--radius); padding: 16px;
  background: var(--panel); display: flex; flex-direction: column; gap: 4px;
}
.stock-num { font-size: 20px; font-weight: 600; letter-spacing: 0.01em; margin-top: 8px; font-variant-numeric: tabular-nums; }
.tag {
  display: inline-block; font-size: 12px; font-weight: 600; color: var(--muted);
  border: 1px solid var(--line); border-radius: 99px; padding: 3px 10px; align-self: flex-start;
}
.stock-foot { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
.price { font-weight: 600; font-size: 15px; }
.price span { color: var(--muted); font-weight: 400; font-size: 13px; }

/* rentals */
.rental {
  border: 1px solid var(--line); border-radius: var(--radius); padding: 16px;
  background: var(--panel); margin-bottom: 12px; box-shadow: var(--shadow-sm);
}
.rental-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.rental-id { min-width: 0; }
.rental-numrow { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.rental-num { font-size: 21px; font-weight: 600; letter-spacing: 0.01em; font-variant-numeric: tabular-nums; }
.pill { font-size: 12px; font-weight: 600; border-radius: 99px; padding: 4px 11px; white-space: nowrap; }
.pill.active { background: #EAF6EE; color: var(--ok); }
.pill.ended, .pill.cancelled { background: var(--bg); color: var(--muted); }
.rental-meta { font-size: 13.5px; color: var(--muted); margin-top: 6px; }
.rental-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.countdown { font-variant-numeric: tabular-nums; font-weight: 600; font-size: 13.5px; }

/* inline inbox (desktop) */
.inbox { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 8px; }
.msg { padding: 12px 0; border-bottom: 1px solid var(--bg); font-size: 15px; }
.msg-head { display: flex; justify-content: space-between; gap: 12px; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
.msg-body { white-space: pre-wrap; word-break: break-word; }
mark { background: #DBEAFE; color: var(--accent); font-weight: 600; padding: 0 3px; border-radius: 3px; }

/* inbox overlay (mobile) */
.inbox-overlay {
  position: fixed; inset: 0; z-index: 60; background: var(--panel);
  display: flex; flex-direction: column;
  animation: slideUp 0.22s ease;
}
@keyframes slideUp { from { transform: translateY(24px); opacity: 0.6; } to { transform: translateY(0); opacity: 1; } }
.inbox-bar {
  position: sticky; top: 0; background: var(--panel); border-bottom: 1px solid var(--line);
  padding: calc(10px + env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) 10px max(16px, env(safe-area-inset-left));
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.inbox-bar .title { font-weight: 600; font-size: 17px; font-variant-numeric: tabular-nums; }
.inbox-bar .sub { font-size: 13px; color: var(--muted); }
.inbox-scroll {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 4px max(16px, env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
}

/* modal / bottom sheet */
.overlay {
  position: fixed; inset: 0; background: rgb(11 18 32 / 45%);
  display: flex; align-items: flex-end; justify-content: center; z-index: 50;
}
.modal {
  background: var(--panel); border-radius: 16px 16px 0 0; padding: 24px 20px;
  padding-bottom: calc(24px + env(safe-area-inset-bottom));
  width: 100%; max-width: none; box-shadow: 0 -8px 30px rgb(11 18 32 / 18%);
  animation: sheetUp 0.22s ease;
}
@keyframes sheetUp { from { transform: translateY(40px); } to { transform: translateY(0); } }
@media (min-width: 640px) {
  .overlay { align-items: center; padding: 20px; }
  .modal { border-radius: var(--radius); max-width: 420px; padding: 24px; box-shadow: 0 12px 40px rgb(11 18 32 / 22%); }
}
.modal h2 { margin-bottom: 4px; }
.amounts { display: flex; gap: 8px; margin: 16px 0 4px; }
.amounts button {
  flex: 1; min-height: 46px; border: 1px solid var(--line); background: var(--panel); border-radius: 10px;
  font: 600 15px 'Inter', system-ui, sans-serif; cursor: pointer; color: var(--ink);
}
.amounts button.on { border-color: var(--accent); color: var(--accent); background: #EFF4FE; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
.modal-actions .btn { flex: 1; }
@media (min-width: 640px) { .modal-actions .btn { flex: 0 0 auto; } }
.note { background: var(--bg); border-radius: 10px; padding: 12px 14px; font-size: 13.5px; color: var(--muted); margin-top: 14px; }

/* toasts */
#toasts {
  position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
  z-index: 100; display: flex; flex-direction: column; gap: 8px;
  width: max-content; max-width: calc(100vw - 32px);
}
.toast {
  background: var(--ink); color: #fff; font-size: 14px; font-weight: 500;
  padding: 11px 18px; border-radius: 10px; box-shadow: 0 4px 16px rgb(11 18 32 / 25%);
}
.toast.err { background: var(--bad); }

/* empty + skeleton states */
.empty {
  color: var(--muted); font-size: 14.5px; padding: 28px 16px; text-align: center;
}
.empty svg { display: block; margin: 0 auto 10px; color: #C2C8D1; }
.skel-card { border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; background: var(--panel); }
.skel {
  display: block; background: var(--line); border-radius: 6px; height: 12px;
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
}

/* compact phone header */
@media (max-width: 560px) {
  #meEmail { display: none; }
  .head-right { gap: 6px; }
}
</style>
</head>
<body>

<header id="appHeader" class="hidden">
  <div class="head-inner">
    <span class="wordmark">
      <svg width="22" height="22" viewBox="0 0 64 64" aria-hidden="true"><rect width="64" height="64" rx="14" fill="#0B1220"/><path d="M22 46V18l20 28V18" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      <span data-brand="name"></span>
    </span>
    <div class="head-right">
      <span class="muted" id="meEmail"></span>
      <span class="balance" id="balance" title="Account balance">$0.00</span>
      <button class="btn btn-sm" id="addFundsBtn">Add funds</button>
      <button class="btn btn-ghost btn-sm btn-icon" id="logoutBtn" aria-label="Log out" title="Log out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="wrap">

  <!-- AUTH -->
  <div id="authView" class="hidden">
    <div class="panel auth-card">
      <div class="auth-brand">
        <div class="wordmark">
          <svg width="26" height="26" viewBox="0 0 64 64" aria-hidden="true"><rect width="64" height="64" rx="14" fill="#0B1220"/><path d="M22 46V18l20 28V18" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          <span data-brand="name"></span>
        </div>
        <div class="muted small" data-brand="tagline"></div>
      </div>
      <div class="auth-tabs" role="tablist" aria-label="Log in or sign up">
        <button id="tabLogin" class="on" role="tab" aria-selected="true">Log in</button>
        <button id="tabSignup" role="tab" aria-selected="false">Sign up</button>
      </div>
      <form id="authForm">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" required>
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" minlength="8" required>
        <div class="form-err" id="authErr" role="alert"></div>
        <button class="btn" type="submit" id="authSubmit">Log in</button>
      </form>
    </div>
  </div>

  <!-- APP -->
  <div id="appView" class="hidden">

    <div class="section panel">
      <h2>Rent a number</h2>
      <div id="stockGrid" class="grid"></div>
      <div id="stockEmpty" class="empty hidden">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="3"/><path d="M10 18h4"/><path d="m8.5 9 3.5 3.5L15.5 9" opacity="0.5"/></svg>
        No numbers available right now — check back soon.
      </div>
    </div>

    <div class="section">
      <h2 style="padding:0 2px;">My rentals</h2>
      <div id="rentalsList"></div>
      <div id="rentalsEmpty" class="empty hidden">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 5.1 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.5-6.9A2 2 0 0 0 16.7 4H7.3a2 2 0 0 0-1.8 1.1z"/></svg>
        No rentals yet. Rent a number above to get started.
      </div>
    </div>

  </div>
</div>

<!-- MOBILE INBOX OVERLAY -->
<div id="inboxOverlay" class="inbox-overlay hidden" role="dialog" aria-modal="true" aria-label="Inbox">
  <div class="inbox-bar">
    <div>
      <div class="title" id="inboxTitle"></div>
      <div class="sub">Live inbox — new messages appear automatically</div>
    </div>
    <button class="btn btn-ghost btn-sm" id="inboxClose">Close</button>
  </div>
  <div class="inbox-scroll" id="inboxMessages"></div>
</div>

<!-- ADD FUNDS MODAL -->
<div id="fundsOverlay" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="fundsTitle">
  <div class="modal">
    <h2 id="fundsTitle">Add funds</h2>
    <div class="muted small">Minimum deposit is $10. Funds are credited to your balance.</div>
    <div class="amounts">
      <button data-amt="1000">$10</button>
      <button data-amt="2500" class="on">$25</button>
      <button data-amt="5000">$50</button>
    </div>
    <label for="customAmt">Custom amount (USD)</label>
    <input type="number" id="customAmt" min="10" step="1" placeholder="25" inputmode="numeric">
    <div id="depositNote" class="note hidden"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="fundsCancel">Close</button>
      <button class="btn" id="fundsGo">Continue</button>
    </div>
  </div>
</div>

<div id="toasts" role="status" aria-live="polite"></div>

<script>
'use strict';

// ---- state -----------------------------------------------------------------
let CONFIG = null;          // /api/config — brand, deposits_mode, min deposit
let ME = null;              // /api/me
let RENTALS = [];
let openInboxRentalId = null;
let inboxOverlayOpen = false; // mobile full-screen inbox
let inboxTimer = null;
let countdownTimer = null;
let authMode = 'login';

const $ = (id) => document.getElementById(id);
const isMobile = () => window.matchMedia('(max-width: 639px)').matches;

// ---- helpers ---------------------------------------------------------------
async function api(path, opts) {
  const res = await fetch(path, Object.assign({ credentials: 'same-origin' }, opts || {}));
  let body = null;
  try { body = await res.json(); } catch {}
  return { status: res.status, ok: res.ok, body };
}

function postJson(path, data) {
  return api(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
}

function toast(msg, isErr) {
  const el = document.createElement('div');
  el.className = 'toast' + (isErr ? ' err' : '');
  el.textContent = msg;
  $('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4200);
}

function dollars(cents) { return '$' + (Number(cents || 0) / 100).toFixed(2); }

function fmtE164(e164) {
  const m = String(e164 || '').match(/^\+1(\d{3})(\d{3})(\d{4})$/);
  return m ? `(${m[1]}) ${m[2]}-${m[3]}` : String(e164 || '');
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// keep in sync with highlightOtpHtml in src/storefront/logic.mjs
function highlightOtpHtml(body) {
  return escapeHtml(body).replace(/\b\d{4,8}\b/g, (m) => '<mark>' + m + '</mark>');
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function countdownText(endsAtIso) {
  let ms = Date.parse(endsAtIso) - Date.now();
  if (!(ms > 0)) return 'expired';
  const h = Math.floor(ms / 3600000); ms -= h * 3600000;
  const m = Math.floor(ms / 60000); ms -= m * 60000;
  const s = Math.floor(ms / 1000);
  return h + 'h ' + String(m).padStart(2, '0') + 'm ' + String(s).padStart(2, '0') + 's';
}

// skeleton loading placeholders (replaced once data arrives)
function skeletonCards(n, lines) {
  let out = '';
  for (let i = 0; i < n; i++) {
    out += '<div class="skel-card" aria-hidden="true">' +
      lines.map((w) => '<span class="skel" style="width:' + w + ';margin-bottom:10px;"></span>').join('') +
      '</div>';
  }
  return out;
}

// ---- boot ------------------------------------------------------------------
async function boot() {
  const cfg = await api('/api/config');
  CONFIG = cfg.body || { brand: { name: '', tagline: '', supportEmail: '' } };
  document.querySelectorAll('[data-brand="name"]').forEach((el) => el.textContent = CONFIG.brand.name);
  document.querySelectorAll('[data-brand="tagline"]').forEach((el) => el.textContent = CONFIG.brand.tagline);
  document.title = CONFIG.brand.name;

  const me = await api('/api/me');
  if (me.ok) {
    ME = me.body;
    showApp();
  } else {
    showAuth();
  }
}

function showAuth() {
  $('authView').classList.remove('hidden');
  $('appView').classList.add('hidden');
  $('appHeader').classList.add('hidden');
}

async function showApp() {
  $('authView').classList.add('hidden');
  $('appView').classList.remove('hidden');
  $('appHeader').classList.remove('hidden');
  renderMe();
  $('stockGrid').innerHTML = skeletonCards(4, ['40%', '70%', '55%']);
  $('rentalsList').innerHTML = skeletonCards(2, ['50%', '80%']);
  await Promise.all([loadStock(), loadRentals()]);
  if (!countdownTimer) countdownTimer = setInterval(tickCountdowns, 1000);
  setInterval(refreshMe, 60000); // keep balance fresh (e.g. deposit confirms)
}

function renderMe() {
  $('meEmail').textContent = ME.email;
  $('balance').textContent = dollars(ME.balance_cents);
}

async function refreshMe() {
  const me = await api('/api/me');
  if (me.ok) { ME = me.body; renderMe(); }
}

// ---- auth ------------------------------------------------------------------
function setAuthMode(mode) {
  authMode = mode;
  $('tabLogin').classList.toggle('on', mode === 'login');
  $('tabSignup').classList.toggle('on', mode === 'signup');
  $('tabLogin').setAttribute('aria-selected', String(mode === 'login'));
  $('tabSignup').setAttribute('aria-selected', String(mode === 'signup'));
  $('authSubmit').textContent = mode === 'login' ? 'Log in' : 'Create account';
  $('password').autocomplete = mode === 'login' ? 'current-password' : 'new-password';
  $('authErr').textContent = '';
}
$('tabLogin').onclick = () => setAuthMode('login');
$('tabSignup').onclick = () => setAuthMode('signup');

$('authForm').onsubmit = async (e) => {
  e.preventDefault();
  $('authErr').textContent = '';
  $('authSubmit').disabled = true;
  const payload = { email: $('email').value.trim(), password: $('password').value };
  const res = await postJson(authMode === 'login' ? '/api/login' : '/api/signup', payload);
  $('authSubmit').disabled = false;
  if (res.ok) {
    const me = await api('/api/me');
    if (me.ok) { ME = me.body; showApp(); }
    return;
  }
  const errs = {
    invalid_credentials: 'Wrong email or password.',
    account_disabled: 'This account is disabled. Contact support.',
    email_taken: 'An account with this email already exists.',
    invalid_email: 'Please enter a valid email address.',
    password_too_short: 'Password must be at least 8 characters.',
  };
  $('authErr').textContent = errs[res.body && res.body.error] || 'Something went wrong. Try again.';
};

$('logoutBtn').onclick = async () => {
  await postJson('/api/logout', {});
  location.reload();
};

// ---- stock -----------------------------------------------------------------
async function loadStock() {
  const res = await api('/api/stock');
  const stock = (res.body && res.body.stock) || [];
  const grid = $('stockGrid');
  grid.innerHTML = '';
  $('stockEmpty').classList.toggle('hidden', stock.length > 0);
  for (const item of stock) {
    const card = document.createElement('div');
    card.className = 'stock-card';
    card.innerHTML =
      '<span class="tag">' + escapeHtml(item.carrier) + '</span>' +
      '<div class="stock-num">' + escapeHtml(item.masked_number) + '</div>' +
      '<div class="muted small">Area code ' + escapeHtml(item.area_code || '—') + '</div>' +
      '<div class="stock-foot">' +
        '<span class="price">' + dollars(item.daily_price_cents) + '<span> / day</span></span>' +
        '<button class="btn btn-sm btn-block">Rent</button>' +
      '</div>';
    card.querySelector('button').onclick = () => rent(item);
    grid.appendChild(card);
  }
}

async function rent(item) {
  const ok = confirm(
    'Rent ' + item.masked_number + ' (' + item.carrier + ') for 24 hours at ' +
    dollars(item.daily_price_cents) + '?'
  );
  if (!ok) return;
  const res = await postJson('/api/rent', { sim_id: item.sim_id });
  if (res.ok) {
    toast('Number rented — it is yours for 24 hours.');
    await Promise.all([refreshMe(), loadStock(), loadRentals()]);
    return;
  }
  if (res.status === 402) {
    toast('Insufficient balance — add funds first.', true);
    openFunds();
  } else if (res.status === 409) {
    toast('That number was just taken. Refreshing stock…', true);
    loadStock();
  } else {
    toast('Could not rent this number. Try another.', true);
    loadStock();
  }
}

// ---- rentals + inbox ---------------------------------------------------------
async function loadRentals() {
  const res = await api('/api/rentals');
  RENTALS = (res.body && res.body.rentals) || [];
  const list = $('rentalsList');
  list.innerHTML = '';
  $('rentalsEmpty').classList.toggle('hidden', RENTALS.length > 0);
  for (const r of RENTALS) {
    const st = r.effective_status;
    const div = document.createElement('div');
    div.className = 'rental';
    div.dataset.id = r.id;
    const statusLabel = st === 'ended' && r.ended_reason === 'number_rotated' ? 'ended (rotated)' : st;
    const inboxOpen = openInboxRentalId === r.id && !inboxOverlayOpen;
    div.innerHTML =
      '<div class="rental-top">' +
        '<div class="rental-id">' +
          '<div class="rental-numrow">' +
            '<span class="rental-num">' + escapeHtml(fmtE164(r.e164)) + '</span> ' +
            '<button class="btn btn-ghost btn-sm" data-act="copy" aria-label="Copy number">' +
              '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
              'Copy</button>' +
            '<span class="pill ' + escapeHtml(st) + '">' + escapeHtml(statusLabel) + '</span>' +
          '</div>' +
          '<div class="rental-meta">' + escapeHtml(r.carrier || '') + ' · ' + dollars(r.price_cents) +
            ' · rented ' + fmtTime(r.starts_at) + '</div>' +
        '</div>' +
        '<div class="rental-actions">' +
          (st === 'active' ? '<span class="countdown" data-ends="' + escapeHtml(r.ends_at) + '"></span>' : '') +
          '<button class="btn btn-sm" data-act="inbox" aria-expanded="' + inboxOpen + '">' +
            (inboxOpen ? 'Hide inbox' : 'View inbox') + '</button>' +
        '</div>' +
      '</div>' +
      '<div class="inbox hidden" data-inbox></div>';
    div.querySelector('[data-act=copy]').onclick = async (ev) => {
      const btn = ev.currentTarget;
      try {
        await navigator.clipboard.writeText(r.e164);
        btn.classList.add('copied');
        btn.lastChild.textContent = 'Copied';
        setTimeout(() => { btn.classList.remove('copied'); btn.lastChild.textContent = 'Copy'; }, 1600);
      } catch { toast('Copy failed — long-press to copy: ' + r.e164, true); }
    };
    div.querySelector('[data-act=inbox]').onclick = () => toggleInbox(r.id);
    list.appendChild(div);
  }
  tickCountdowns();
  if (openInboxRentalId != null) {
    const open = RENTALS.find((r) => r.id === openInboxRentalId);
    if (!open) { closeInbox(); return; }
    if (inboxOverlayOpen) $('inboxTitle').textContent = fmtE164(open.e164);
    else showInboxPanel(openInboxRentalId);
  }
}

function tickCountdowns() {
  document.querySelectorAll('.countdown').forEach((el) => {
    el.textContent = countdownText(el.dataset.ends) + ' left';
  });
}

function inboxLoadingHtml() {
  return '<div class="empty">Loading messages…</div>';
}

function toggleInbox(rentalId) {
  if (openInboxRentalId === rentalId) { closeInbox(); loadRentals(); return; }
  openInboxRentalId = rentalId;
  if (isMobile()) {
    // full-screen slide-up inbox on phones
    const r = RENTALS.find((x) => x.id === rentalId);
    $('inboxTitle').textContent = r ? fmtE164(r.e164) : '';
    $('inboxMessages').innerHTML = inboxLoadingHtml();
    $('inboxOverlay').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
    inboxOverlayOpen = true;
    $('inboxClose').focus();
  } else {
    inboxOverlayOpen = false;
    showInboxPanel(rentalId);
    const box = document.querySelector('.rental[data-id="' + rentalId + '"] [data-inbox]');
    if (box && !box.innerHTML) box.innerHTML = inboxLoadingHtml();
  }
  pollInbox();
  if (inboxTimer) clearInterval(inboxTimer);
  inboxTimer = setInterval(pollInbox, 5000); // poll every 5s while open
  loadRentals();
}

function closeInbox() {
  openInboxRentalId = null;
  if (inboxTimer) { clearInterval(inboxTimer); inboxTimer = null; }
  if (inboxOverlayOpen) {
    inboxOverlayOpen = false;
    $('inboxOverlay').classList.add('hidden');
    document.body.style.overflow = '';
  }
}

$('inboxClose').onclick = () => { closeInbox(); loadRentals(); };

function showInboxPanel(rentalId) {
  document.querySelectorAll('.rental').forEach((card) => {
    const box = card.querySelector('[data-inbox]');
    box.classList.toggle('hidden', Number(card.dataset.id) !== rentalId);
  });
}

function inboxTargetEl() {
  if (inboxOverlayOpen) return $('inboxMessages');
  return document.querySelector('.rental[data-id="' + openInboxRentalId + '"] [data-inbox]');
}

async function pollInbox() {
  if (openInboxRentalId == null) return;
  const id = openInboxRentalId;
  const res = await api('/api/rentals/' + id + '/messages');
  if (id !== openInboxRentalId) return; // panel changed while fetching
  const box = inboxTargetEl();
  if (!box) return;
  if (!res.ok) { box.innerHTML = '<div class="empty">Could not load messages.</div>'; return; }
  const msgs = (res.body && res.body.messages) || [];
  if (!msgs.length) {
    box.innerHTML = '<div class="empty">No messages yet — they appear here within seconds of arriving.</div>';
    return;
  }
  const sorted = msgs.slice().sort((a, b) => Date.parse(b.received_at) - Date.parse(a.received_at)); // newest first
  box.innerHTML = sorted.map((m) =>
    '<div class="msg">' +
      '<div class="msg-head"><span>From ' + escapeHtml(m.from_number || 'unknown') + '</span>' +
      '<span>' + escapeHtml(fmtTime(m.received_at)) + '</span></div>' +
      '<div class="msg-body">' + highlightOtpHtml(m.body) + '</div>' +
    '</div>'
  ).join('');
}

// ---- deposits ----------------------------------------------------------------
let pickedCents = 2500;

function openFunds() {
  $('fundsOverlay').classList.remove('hidden');
  $('depositNote').classList.add('hidden');
}
$('addFundsBtn').onclick = openFunds;
$('fundsCancel').onclick = () => $('fundsOverlay').classList.add('hidden');
$('fundsOverlay').onclick = (e) => {
  if (e.target === $('fundsOverlay')) $('fundsOverlay').classList.add('hidden');
};

// Escape closes whichever overlay is open
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  if (!$('fundsOverlay').classList.contains('hidden')) { $('fundsOverlay').classList.add('hidden'); return; }
  if (inboxOverlayOpen) { closeInbox(); loadRentals(); }
});

document.querySelectorAll('.amounts button').forEach((b) => {
  b.onclick = () => {
    document.querySelectorAll('.amounts button').forEach((x) => x.classList.remove('on'));
    b.classList.add('on');
    pickedCents = Number(b.dataset.amt);
    $('customAmt').value = '';
  };
});
$('customAmt').oninput = () => {
  document.querySelectorAll('.amounts button').forEach((x) => x.classList.remove('on'));
  pickedCents = Math.round(Number($('customAmt').value || 0) * 100);
};

$('fundsGo').onclick = async () => {
  const min = (CONFIG && CONFIG.min_deposit_cents) || 1000;
  if (!Number.isInteger(pickedCents) || pickedCents < min) {
    toast('Minimum deposit is ' + dollars(min) + '.', true);
    return;
  }
  $('fundsGo').disabled = true;
  const res = await postJson('/api/deposits', { amount_cents: pickedCents });
  $('fundsGo').disabled = false;
  if (!res.ok) {
    toast('Could not start the deposit. Try again or contact support.', true);
    return;
  }
  const note = $('depositNote');
  note.classList.remove('hidden');
  if (res.body.mode === 'crypto') {
    window.open(res.body.invoice_url, '_blank');
    note.textContent =
      'Payment page opened in a new tab. Your balance updates automatically ' +
      'once the payment confirms (deposit #' + res.body.deposit_id + ').';
  } else {
    note.textContent = res.body.instructions;
  }
};

boot();
</script>
</body>
</html>
