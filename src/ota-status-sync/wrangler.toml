name = "ota-status-sync"
main = "index.js"
compatibility_date = "2024-01-01"
account_id = "5313f8b98e20a8915418b2683ad7278c"
workers_dev = true

[triggers]
# OTA status sync at midnight and noon UTC (every 12 hours)
crons = ["0 0 * * *", "0 12 * * *"]

# Shared token cache KV (same namespace as mdn-rotator — avoids redundant token fetches)
[[kv_namespaces]]
binding = "TOKEN_CACHE"
id = "edaf2c8828b14badb3037600635f8a7f"

[observability.logs]
enabled = true
invocation_logs = true
